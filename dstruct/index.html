<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EDU-ALGO · Data structures</title>
<meta name="description" content="An interactive data-structures simulator: a hand-written deterministic engine builds the structure you choose over a fixed workload and animates it step by step — BST/AVL trees, binary heaps, hash tables. Guided levels with hidden test workloads, and a free sandbox.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%2307130c'/%3E%3Ctext x='8' y='12' font-size='9' font-family='monospace' font-weight='bold' fill='%2357e389' text-anchor='middle'%3E%E2%97%87%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="top">
  <div class="brand">
    <a class="brand-mark" href="../" title="Hub">◇</a>
    <div class="brand-text">
      <h1>EDU-ALGO <span class="brand-sub">DATA STRUCTURES</span></h1>
      <span class="brand-tag" data-i18n="tagline"></span>
    </div>
  </div>
  <nav class="top-nav">
    <a class="btn btn-ghost" href="../" data-i18n="backHub"></a>
    <button id="btnLevels" class="btn" data-i18n="navLevels"></button>
    <button id="btnSandbox" class="btn" data-i18n="navSandbox"></button>
    <button id="btnHelp" class="btn btn-ghost" data-i18n-title="help">?</button>
    <div class="lang-switch" role="group" aria-label="language">
      <button data-lang="it">IT</button><button data-lang="en">EN</button>
    </div>
  </nav>
</header>

<main class="workbench">
  <section class="col-lesson" id="lessonPanel"></section>

  <section class="col-main">
    <div class="card">
      <div class="card-head">
        <span class="card-title" data-i18n="panelView"></span>
        <div class="toolbar">
          <button id="btnRun" class="btn btn-primary" title="Ctrl+Enter" data-i18n="run"></button>
          <button id="btnPause" class="btn" hidden data-i18n="pause"></button>
          <button id="btnStep" class="btn" title="F8" data-i18n="step"></button>
          <button id="btnReset" class="btn" data-i18n="reset"></button>
          <label class="speed">
            <span data-i18n="speed"></span>
            <input id="speed" type="range" min="0" max="5" value="2">
          </label>
        </div>
      </div>
      <div id="structView"></div>
    </div>

    <div class="card">
      <div class="card-head"><span class="card-title" data-i18n="panelScript"></span></div>
      <div id="editor"></div>
      <div id="statusLine" class="status-line"></div>
    </div>
  </section>

  <section class="col-inspect">
    <div class="card">
      <div class="card-head"><span class="card-title" data-i18n="panelResult"></span></div>
      <div id="resultPanel"></div>
    </div>
    <div class="card" id="casesCard">
      <div class="card-head"><span class="card-title" data-i18n="panelCases"></span></div>
      <div id="casesPanel"></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title" data-i18n="panelEvents"></span></div>
      <div id="eventLog"></div>
    </div>
  </section>
</main>

<div id="levelSelectOverlay" class="overlay" hidden></div>

<div id="helpOverlay" class="overlay" hidden>
  <div class="modal modal-help">
    <div class="modal-head">
      <h2 id="helpTitle"></h2>
      <button class="btn btn-ghost modal-close" id="helpClose" aria-label="close">✕</button>
    </div>
    <div id="helpBody" class="help-body"></div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
